<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Jacob</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .error-page {
      min-height: 70vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 48px 24px;
    }
    .error-page h1 {
      font-size: clamp(3rem, 10vw, 5rem);
      margin: 0 0 8px;
      letter-spacing: -0.04em;
      color: var(--text);
    }
    .error-page p { color: var(--muted); margin: 0 0 28px; font-size: 1.05rem; }
  </style>
</head>
<body>
  <main class="error-page">
    <div>
      <h1>404</h1>
      <p>This page doesn't exist. The rest of the site is still here.</p>
      <a class="btn btn-primary" href="./">Back to home</a>
    </div>
  </main>
</body>
</html>
