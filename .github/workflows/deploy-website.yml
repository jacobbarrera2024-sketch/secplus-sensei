# Deploy portfolio website
# If this fails: enable Pages at Settings → Pages → GitHub Actions first.

name: Deploy portfolio website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "ai-demo/**"
      - "quick-quote/**"
      - "sheet-dash/**"
      - "feed-collector/public/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Sync demos into website
        run: |
          rm -rf website/ai-demo website/quick-quote website/sheet-dash
          cp -r ai-demo website/ai-demo
          cp -r quick-quote website/quick-quote
          cp -r sheet-dash website/sheet-dash
          rm -rf website/ai-demo/.github website/quick-quote/.github website/sheet-dash/.github 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
